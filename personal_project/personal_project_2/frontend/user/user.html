<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeNu – Trang của bạn</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="./assets/fonts/fontawesome-free-7.2.0-web/fontawesome-free-7.2.0-web/css/all.min.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">

    <!-- CSS gốc dùng chung -->
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/main.css">

    <!-- CSS riêng trang user -->
    <link rel="stylesheet" href="../assets/css/user.css">
</head>

<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="grid">
            <nav class="header__navbar">
                <ul class="header__navbar-list">
                    <li class="header__navbar-item header__navbar-item--separate">
                        <a href="../user/dashboard" class="header__navbar-item-link">
                            <i class="fa-solid fa-house" style="margin-right:6px"></i>
                            Trang chủ
                        </a>
                    </li>
                    <!-- <li class="header__navbar-item">
                    <span class="header__navbar-title--no-pointer">Kết nối</span>
                    <a href="" class="header__navbar-icon-link">
                        <i class="header__navbar-icon fa-brands fa-facebook"></i>
                    </a>
                    <a href="" class="header__navbar-icon-link">
                        <i class="header__navbar-icon fa-brands fa-instagram"></i>
                    </a>
                </li> -->
                </ul>

                <ul class="header__navbar-list">
                    <li class="header__navbar-item" id="user-greeting">
                        <i class="header__navbar-icon fa-regular fa-circle-user"></i>
                        <span id="username-display" style="margin-left:6px;font-weight:500;">Người dùng</span>
                    </li>
                    <li class="header__navbar-item header__navbar-item--strong" id="btn-logout" style="cursor:pointer">
                        <i class="fa-solid fa-right-from-bracket" style="margin-right:4px"></i>
                        Đăng xuất
                    </li>
                </ul>
            </nav>

            <!-- Header row 2: Logo + Tên trang -->
            <div class="header-with-serch">
                <div class="header__logo">
                    <svg class="header__logo-img" xmlns="http://www.w3.org/2000/svg" version="1.0" width="385.000000pt"
                        height="360.000000pt" viewBox="0 0 385.000000 360.000000" preserveAspectRatio="xMidYMid meet">

                            stroke="none">

                                d="M2040 2305 c-34 -40 9 -150 78 -203 46 -35 106 -37 133 -3 40 49 15 112 -71 180 -57 45 -116 55 -140 26z m80 -119 c0 -8 -4 -17 -9 -21 -12 -7 -24 12 -16 25 9 15 25 12 25 -4z" />

                                d="M1720 2255 c-30 -16 -115 -121 -130 -160 -13 -33 2 -95 27 -118 33 -29 73 -39 110 -26 39 13 105 90 123 145 16 47 8 129 -15 154 -21 24 -77 26 -115 5z m110 -140 c0 -8 -7 -15 -15 -15 -8 0 -15 7 -15 15 0 8 7 15 15 15 8 0 15 -7 15 -15z" />

                                d="M1990 2081 c-36 -10 -40 -48 -6 -57 33 -8 33 -29 0 -50 -24 -16 -26 -16 -55 5 -31 23 -40 13 -12 -14 12 -13 26 -15 52 -10 20 3 52 8 71 9 19 2 40 4 47 5 15 1 37 40 29 49 -4 3 -14 -4 -22 -17 -18 -25 -51 -25 -67 0 -8 12 -5 21 12 38 37 37 12 59 -49 42z m50 -11 c0 -5 -4 -10 -10 -10 -5 0 -10 5 -10 10 0 6 5 10 10 10 6 0 10 -4 10 -10z" />
                        </g>
                    </svg>
                </div>

                <!-- Tab navigation -->
                <div class="user-tabs">
                    <button class="user-tab user-tab--active" data-tab="post">
                        <i class="fa-solid fa-plus"></i>
                        Đăng bài
                    </button>
                    <button class="user-tab" data-tab="map">
                        <i class="fa-solid fa-map-location-dot"></i>
                        Xem bản đồ
                    </button>
                    <button class="user-tab" data-tab="my-posts">
                        <i class="fa-solid fa-list"></i>
                        Bài đã đăng
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="user-main container">

        <!-- ===== TAB 1: ĐĂNG BÀI ===== -->
        <section class="tab-content tab-content--active" id="tab-post">
            <div class="post-form-wrap">
                <div class="post-form-header">
                    <h2 class="post-form-title">
                        <i class="fa-solid fa-pen-to-square"></i>
                        Đăng tin cho thuê phòng
                    </h2>
                    <p class="post-form-sub">Điền đầy đủ thông tin để tiếp cận nhiều người thuê hơn</p>
                </div>

                <form class="post-form" id="post-form" novalidate>

                    <!-- Hàng 1: Tên + Loại phòng -->
                    <div class="post-form__row">
                        <div class="post-form__group post-form__group--2">
                            <label class="post-form__label">
                                Tên tiêu đề <span class="required">*</span>
                            </label>
                            <input id="post-name" type="text" class="post-form__input"
                                placeholder="VD: Phòng trọ cao cấp gần ĐH Bách Khoa">
                            <span class="post-form__error" id="err-name"></span>
                        </div>

                        <div class="post-form__group post-form__group--1">
                            <label class="post-form__label">
                                Loại phòng <span class="required">*</span>
                            </label>
                            <select id="post-type" class="post-form__select">
                                <option value="">-- Chọn loại --</option>
                                <option value="phong_tro">Phòng trọ</option>
                                <option value="chung_cu">Chung cư mini</option>
                                <option value="can_ho">Căn hộ dịch vụ</option>
                                <option value="nha_nguyen_can">Nhà nguyên căn</option>
                            </select>
                            <span class="post-form__error" id="err-type"></span>
                        </div>
                    </div>

                    <!-- Hàng 2: Địa chỉ + Khu vực + Quận/huyện -->
                    <div class="post-form__row">
                        <div class="post-form__group post-form__group--2">
                            <label class="post-form__label">
                                Địa chỉ cụ thể <span class="required">*</span>
                            </label>
                            <input id="post-address" type="text" class="post-form__input"
                                placeholder="VD: Ngõ 123 Giải Phóng">
                            <span class="post-form__error" id="err-address"></span>
                        </div>

                        <div class="post-form__group post-form__group--1">
                            <label class="post-form__label">
                                Khu vực <span class="required">*</span>
                            </label>
                            <select id="post-area" class="post-form__select">
                                <option value="">-- Chọn khu vực --</option>
                                <option value="Thái Nguyên">Thái Nguyên</option>
                                <option value="Sông Công">Sông Công</option>
                                <option value="Phổ Yên">Phổ Yên</option>
                                <option value="Bắc Kạn">Bắc Kạn</option>
                            </select>
                            <span class="post-form__error" id="err-area"></span>
                        </div>
                    </div>

                    <!-- Hàng 2b: Quận/huyện -->
                    <div class="post-form__row">
                        <div class="post-form__group post-form__group--full">
                            <label class="post-form__label">Quận / Huyện<span class="required"> *</span></label>
                            <input id="post-district" type="text" class="post-form__input"
                                placeholder="VD: Đồng Hỷ, TP. Thái Nguyên">
                        </div>
                    </div>

                    <!-- Hàng 2c: Số điện thoại liên hệ -->
                    <div class="post-form__row">
                        <div class="post-form__group post-form__group--full">
                            <label class="post-form__label">
                                Số điện thoại liên hệ <span class="required">*</span>
                            </label>
                            <div class="post-form__input-icon">
                                <span class="post-form__input-prefix">
                                    <i class="fa-solid fa-phone"></i>
                                </span>
                                <input id="post-phone" type="tel" class="post-form__input post-form__input--with-prefix"
                                    placeholder="VD: 0912 345 678" maxlength="15">
                            </div>
                            <span class="post-form__error" id="err-phone"></span>
                        </div>
                    </div>

                    <!-- Hàng 3: Giá + Diện tích + Rating -->
                    <div class="post-form__row">
                        <div class="post-form__group post-form__group--1">
                            <label class="post-form__label">
                                Giá thuê (đồng/tháng) <span class="required">*</span>
                            </label>
                            <div class="post-form__input-icon">
                                <input id="post-price" type="number" class="post-form__input" placeholder="VD: 3500000"
                                    min="0">
                                <span class="post-form__input-unit">đ/tháng</span>
                            </div>
                            <div id="price-preview"></div>
                            <span class="post-form__error" id="err-price"></span>
                        </div>

                        <div class="post-form__group post-form__group--1">
                            <label class="post-form__label">
                                Diện tích (m²) <span class="required">*</span>
                            </label>
                            <div class="post-form__input-icon">
                                <input id="post-area-m2" type="number" class="post-form__input" placeholder="VD: 25"
                                    min="1">
                                <span class="post-form__input-unit">m²</span>
                            </div>
                            <span class="post-form__error" id="err-area-m2"></span>
                        </div>

                        <div class="post-form__group post-form__group--1">
                            <label class="post-form__label">Đánh giá (1–5)</label>
                            <div class="star-rating" id="star-rating">
                                <span class="star" data-val="1">★</span>
                                <span class="star" data-val="2">★</span>
                                <span class="star" data-val="3">★</span>
                                <span class="star" data-val="4">★</span>
                                <span class="star" data-val="5">★</span>
                            </div>
                            <input type="hidden" id="post-rating" value="5">
                        </div>
                    </div>

                    <!-- Hàng 4: Mô tả -->
                    <div class="post-form__row">
                        <div class="post-form__group post-form__group--full">
                            <label class="post-form__label">Mô tả chi tiết</label>
                            <textarea id="post-desc" class="post-form__textarea" rows="4"
                                placeholder="Mô tả thêm về phòng: hướng nhà, nội thất, điện nước, quy định..."></textarea>
                        </div>
                    </div>

                    <!-- Hàng 5: Tags -->
                    <div class="post-form__row">
                        <div class="post-form__group post-form__group--full">
                            <label class="post-form__label">Tiện ích</label>
                            <div class="tag-picker" id="tag-picker">
                                <label class="tag-option"><input type="checkbox" value="Wifi"> Wifi</label>
                                <label class="tag-option"><input type="checkbox" value="Điều hòa"> Điều hòa</label>
                                <label class="tag-option"><input type="checkbox" value="Nóng lạnh"> Nóng lạnh</label>
                                <label class="tag-option"><input type="checkbox" value="Bếp riêng"> Bếp riêng</label>
                                <label class="tag-option"><input type="checkbox" value="Chỗ để xe"> Chỗ để xe</label>
                                <label class="tag-option"><input type="checkbox" value="Bảo vệ 24/7"> Bảo vệ
                                    24/7</label>
                                <label class="tag-option"><input type="checkbox" value="Thú cưng"> Thú cưng</label>
                                <label class="tag-option"><input type="checkbox" value="Gym"> Gym</label>
                                <label class="tag-option"><input type="checkbox" value="Full nội thất"> Full nội
                                    thất</label>
                                <label class="tag-option"><input type="checkbox" value="Điện nước giá dân"> Điện nước
                                    giá dân</label>
                            </div>
                        </div>
                    </div>

                    <!-- Hàng 6: Upload ảnh -->
                    <div class="post-form__row">
                        <div class="post-form__group post-form__group--full">
                            <label class="post-form__label">
                                Ảnh phòng <span class="required">*</span>
                                <span style="font-weight:400;color:#888;font-size:1.2rem"> (ảnh đầu tiên là ảnh đại
                                    diện)</span>
                            </label>
                            <div class="img-upload-wrap" id="img-upload-wrap">
                                <label class="img-upload-btn" for="img-input">
                                    <i class="fa-solid fa-cloud-arrow-up"></i>
                                    <span>Chọn ảnh từ máy tính</span>
                                    <span class="img-upload-hint">PNG, JPG, JPEG — tối đa 5 ảnh</span>
                                </label>
                                <input type="file" id="img-input" accept="image/*" multiple style="display:none">
                                <div class="img-preview-list" id="img-preview-list"></div>
                            </div>
                            <span class="post-form__error" id="err-img"></span>
                        </div>
                    </div>

                    <!-- Checkbox xác thực -->
                    <div class="post-form__row">
                        <div class="post-form__group post-form__group--full">
                            <label class="post-form__checkbox-label">
                                <input type="checkbox" id="post-verified">
                                <span>Tôi xác nhận thông tin trên là chính xác và tôi là chủ sở hữu / người quản lý hợp
                                    pháp</span>
                            </label>
                        </div>
                    </div>

                    <!-- Nút submit -->
                    <div class="post-form__actions">
                        <button type="button" class="btn-form btn-form--ghost" id="btn-reset-form">
                            <i class="fa-solid fa-rotate-left"></i> Làm mới
                        </button>
                        <button type="submit" class="btn-form btn-form--primary" id="btn-submit-post">
                            <i class="fa-solid fa-paper-plane"></i> Đăng tin ngay
                        </button>
                    </div>

                    <!-- Toast thông báo -->
                    <div class="post-toast" id="post-toast"></div>

                </form>
            </div>
        </section>

        <!-- ===== TAB 2: BẢN ĐỒ ===== -->
        <section class="tab-content" id="tab-map">
            <div class="map-wrap">
                <div class="map-toolbar">
                    <h2 class="map-title">
                        <i class="fa-solid fa-map-location-dot"></i>
                        Bản đồ phòng trọ
                    </h2>
                    <div class="map-filters">
                        <select class="map-filter-select" id="map-filter-area">
                            <option value="all">Tất cả khu vực</option>
                            <option value="Thái Nguyên">Thái Nguyên</option>
                            <option value="Sông Công">Sông Công</option>
                            <option value="Phổ Yên">Phổ Yên</option>
                            <option value="Bắc Kạn">Bắc Kạn</option>
                        </select>
                        <select class="map-filter-select" id="map-filter-type">
                            <option value="all">Tất cả loại</option>
                            <option value="phong_tro">Phòng trọ</option>
                            <option value="chung_cu">Chung cư mini</option>
                            <option value="can_ho">Căn hộ dịch vụ</option>
                            <option value="nha_nguyen_can">Nhà nguyên căn</option>
                        </select>
                    </div>
                </div>
                <div id="leaflet-map"></div>
                <div class="map-legend">
                    <span class="map-legend-dot map-legend-dot--low"></span> &lt; 3tr
                    <span class="map-legend-dot map-legend-dot--mid" style="margin-left:12px"></span> 3–6tr
                    <span class="map-legend-dot map-legend-dot--high" style="margin-left:12px"></span> &gt; 6tr
                </div>
            </div>
        </section>

        <!-- ===== TAB 3: BÀI ĐÃ ĐĂNG ===== -->
        <section class="tab-content" id="tab-my-posts">
            <div class="my-posts-wrap">
                <div class="my-posts-header">
                    <h2 class="post-form-title">
                        <i class="fa-solid fa-list-check"></i>
                        Bài đã đăng của bạn
                    </h2>
                    <span id="my-posts-count" class="my-posts-count">0 bài</span>
                </div>
                <div class="my-posts-grid" id="my-posts-grid">
                    <div class="my-posts-empty">
                        <i class="fa-regular fa-folder-open"></i>
                        <p>Bạn chưa đăng bài nào.</p>
                        <button class="btn-form btn-form--primary" onclick="switchTab('post')">
                            Đăng bài ngay
                        </button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Leaflet JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    <!-- JS riêng trang user -->
    <script src="../assets/js/user.js"></script>
</body>

</html>

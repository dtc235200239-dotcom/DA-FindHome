<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<body>
    <form id="loginForm">
        <input type="text" id="login_id" placeholder="Tên đăng nhập hoặc Email" required>
        <input type="password" id="password" placeholder="Mật khẩu" required>
        <button type="submit">Đăng nhập</button> </form>

    <div id="message" style="margin-top: 15px; font-weight: bold;"></div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (event) {
            event.preventDefault(); // Ngăn chặn load lại trang

            const loginIdVal = document.getElementById('login_id').value;
            const passVal = document.getElementById('password').value;
            const msgBox = document.getElementById('message');

            msgBox.innerHTML = "Đang xử lý...";
            msgBox.style.color = "black"; // Reset màu chữ

            // Đảm bảo đường dẫn này khớp với backend của bạn
            const apiUrl = 'http://localhost:8080/MY_PROJECT/personal_project/personal_project_2/backend/public/index.php?action=login';

            fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    login_id: loginIdVal, 
                    password: passVal
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    msgBox.style.color = "green";
                    msgBox.innerHTML = data.message + " Xin chào " + data.user.email;
                    
                    // Gợi ý: Chuyển hướng trang web sau khi đăng nhập thành công
                    // setTimeout(() => { window.location.href = '../admin/dashboard.html'; }, 1500);
                } else {
                    msgBox.style.color = "red";
                    msgBox.innerHTML = data.message;
                }
            })
            .catch(error => {
                console.error('Lỗi:', error);
                msgBox.style.color = "red";
                msgBox.innerHTML = "Không thể kết nối đến máy chủ!";
            });
        });
    </script>
</body>

</html>
